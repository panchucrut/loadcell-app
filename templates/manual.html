<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manual — Sensores Prensa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f5f7fa; color: #24292f; font-size: 0.92rem; }
    .manual-wrap { max-width: 860px; margin: 0 auto; }
    .card { background: #fff; border: 1px solid #d0d7de; border-radius: 8px; }
    h1 { font-size: 1.5rem; }
    h2 { font-size: 1.15rem; margin-top: 1.8rem; padding-bottom: 4px; border-bottom: 1px solid #d0d7de; }
    h3 { font-size: 1rem; margin-top: 1.2rem; }
    table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.85rem; }
    th { background: #f0f3f8; padding: 6px 10px; text-align: left; border: 1px solid #d0d7de; }
    td { padding: 6px 10px; border: 1px solid #e8ecf0; vertical-align: top; }
    code { background: #f0f3f8; padding: 1px 5px; border-radius: 3px; font-size: 0.85em; color: #0550ae; }
    pre { background: #f0f3f8; padding: 12px; border-radius: 6px; overflow-x: auto; }
    blockquote { border-left: 3px solid #0969da; margin: 1rem 0; padding: 6px 16px; background: #f0f8ff; border-radius: 0 6px 6px 0; color: #444; }
    blockquote p { margin: 0; }
    .navbar { background: #fff !important; border-bottom: 1px solid #d0d7de; }
  </style>
</head>
<body>
<nav class="navbar navbar-light px-3 py-2 mb-4">
  <a class="navbar-brand fw-bold text-primary mb-0" href="/">⚙ Sensores Prensa</a>
  <a class="btn btn-sm btn-outline-secondary" href="/">← Volver a la app</a>
</nav>
<div class="container-fluid">
  <div class="manual-wrap">
    <div class="card p-4">
      {{ content | safe }}
    </div>
  </div>
</div>
</body>
</html>
